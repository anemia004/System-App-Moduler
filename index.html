<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#008080">
    <link rel="manifest" href="manifest.json">
    <title>System Moduler</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            background: #008080;
            font-family: "MS Sans Serif", "Microsoft Sans Serif", "Segoe UI", Tahoma, sans-serif;
            font-size: 12px;
            color: #000;
            touch-action: manipulation;
            overflow: hidden;
        }
        .window {
            background: #c0c0c0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 6px 4px;
            display: flex;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            user-select: none;
            flex-shrink: 0;
        }
        .title-bar-icon {
            width: 24px; height: 24px;
            background: #c0c0c0;
            border: 1px solid #808080;
            margin-right: 4px;
            flex-shrink: 0;
        }
        .window-content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            flex: 1;
        }
        .field-row {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        label {
            font-size: 12px;
            font-weight: normal;
        }
        .required-star {
            color: red;
            font-weight: bold;
        }
        input[type="text"], input[type="file"] {
            background: white;
            border: 1px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            padding: 8px 6px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            width: 100%;
        }
        input[type="text"]:focus, input[type="file"]:focus {
            outline: 1px dotted #000;
        }
        .btn {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 10px 24px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            align-self: flex-start;
            margin-top: 8px;
            box-shadow: 1px 1px 0 0 #000;
            touch-action: manipulation;
        }
        .btn:active {
            border-color: #808080 #ffffff #ffffff #808080;
            box-shadow: none;
        }
        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .info-text {
            font-size: 11px;
            color: #444;
            margin-top: 2px;
        }
        .status-bar {
            background: #c0c0c0;
            border-top: 2px solid #808080;
            padding: 6px 8px;
            font-size: 11px;
            display: flex;
            gap: 8px;
            box-shadow: inset 0 1px 0 #ffffff;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-icon"></div>
            System Moduler
        </div>
        <div class="window-content">
            <div class="field-row">
                <label for="apkFile">APK file <span class="required-star">*</span></label>
                <input type="file" id="apkFile" accept=".apk" required>
            </div>
            <div class="field-row">
                <label for="moduleId">Module ID <span class="required-star">*</span> <span class="info-text">(unique, no spaces)</span></label>
                <input type="text" id="moduleId" required>
            </div>
            <div class="field-row">
                <label for="moduleName">Module Name</label>
                <input type="text" id="moduleName" placeholder="My Module">
            </div>
            <div class="field-row">
                <label for="moduleVersion">Version</label>
                <input type="text" id="moduleVersion" placeholder="v1.0">
            </div>
            <div class="field-row">
                <label for="moduleVersionCode">Version Code</label>
                <input type="text" id="moduleVersionCode" placeholder="1">
            </div>
            <div class="field-row">
                <label for="moduleAuthor">Author</label>
                <input type="text" id="moduleAuthor" placeholder="anemia004">
            </div>
            <button class="btn" id="generateBtn" onclick="buildModule()">Generate Zip</button>
        </div>
        <div class="status-bar">
            <span id="statusText">Ready</span>
            <span>|</span>
            <span>Flashes with Magisk 20.4+</span>
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('statusText');
        const btn = document.getElementById('generateBtn');

        function getInputValue(id, defaultVal) {
            const input = document.getElementById(id);
            return input.value.trim() || defaultVal;
        }

        // Sanitize for folder/file names – keep letters, digits, dots, hyphens, underscores
        function sanitizeName(str) {
            return str.replace(/[^a-zA-Z0-9._-]/g, '_');
        }

        const updateBinary = `#!/sbin/sh
umask 022
ui_print() { echo "$1"; }
require_new_magisk() {
  ui_print "*******************************"
  ui_print " Please install Magisk v20.4+! "
  ui_print "*******************************"
  exit 1
}
OUTFD=$2
ZIPFILE=$3
mount /data 2>/dev/null
[ -f /data/adb/magisk/util_functions.sh ] || require_new_magisk
. /data/adb/magisk/util_functions.sh
[ $MAGISK_VER_CODE -lt 20400 ] && require_new_magisk
install_module
exit 0`;

        const updaterScript = "#MAGISK";

        function buildCustomizeSh(apkDir, apkName) {
            return `#!/sbin/sh
APK_DIR="$MODPATH/${apkDir}"
APK_FILE="$APK_DIR/${apkName}"
chmod 755 "$APK_DIR"
chmod 644 "$APK_FILE"`;
        }

        function buildModuleProp(id, name, version, versionCode, author) {
            return `id=${id}
name=${name}
version=${version}
versionCode=${versionCode}
author=${author}
description=Systemlessly installs a user-provided APK as a system app.`;
        }

        async function buildModule() {
            const apkFileInput = document.getElementById('apkFile');
            const moduleIdInput = document.getElementById('moduleId');

            // Required field validation
            if (!apkFileInput.files.length) {
                alert('Please select an APK file (required).');
                return;
            }
            const moduleId = moduleIdInput.value.trim();
            if (!moduleId) {
                alert('Module ID is required (marked with *).');
                return;
            }

            // Optional fields with defaults
            const moduleName    = getInputValue('moduleName',     document.getElementById('moduleName').placeholder);
            const moduleVersion = getInputValue('moduleVersion',  document.getElementById('moduleVersion').placeholder);
            const moduleVersionCode = getInputValue('moduleVersionCode', document.getElementById('moduleVersionCode').placeholder);
            const authorRaw = document.getElementById('moduleAuthor').value.trim();
            const moduleAuthor = authorRaw || "anemia004";

            const apkFile = apkFileInput.files[0];
            const apkName = sanitizeName(apkFile.name);
            const folderName = sanitizeName(moduleId);
            const apkDir = `system/priv-app/${folderName}`;

            btn.disabled = true;
            statusEl.textContent = 'Building...';

            try {
                const apkData = await apkFile.arrayBuffer();

                const zip = new JSZip();
                const metaDir = "META-INF/com/google/android/";
                zip.file(metaDir + "update-binary", updateBinary);
                zip.file(metaDir + "updater-script", updaterScript);
                zip.file("module.prop", buildModuleProp(moduleId, moduleName, moduleVersion, moduleVersionCode, moduleAuthor));
                zip.file("customize.sh", buildCustomizeSh(apkDir, apkName));
                zip.file(apkDir + "/" + apkName, apkData);

                const content = await zip.generateAsync({ type: "blob" });

                const url = URL.createObjectURL(content);
                const a = document.createElement("a");
                a.href = url;
                a.download = `${moduleId}.zip`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                statusEl.textContent = 'Module zip generated!';
            } catch (error) {
                alert('Error creating zip: ' + error.message);
                statusEl.textContent = 'Error';
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
